name: Echo
options:
  bundleIdPrefix: com.echo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
targets:
  Echo:
    type: application
    platform: iOS
    sources:
      - path: Echo
        excludes:
          - "**/.DS_Store"
          - "Resources/**"
    resources:
      - path: Echo/Resources
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.echo.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: Écho
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Écho a besoin du micro pour écouter les conversations et transcrire la parole."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Écho utilise la reconnaissance vocale pour transcrire les conversations."
